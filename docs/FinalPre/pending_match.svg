<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Typed pending matching flow</text><rect x="65" y="95" width="1070" height="85" rx="12" class="blue"/><text x="600" y="133" text-anchor="middle" class="head">Decoded response</text><text x="600" y="163" text-anchor="middle" class="txt">type, src, wire_id, boot_id, stream sequence</text><path d="M600 180L600 230" class="line" marker-end="url(#a)"/><rect x="390" y="230" width="420" height="78" rx="12" class="amber"/><text x="600" y="268" text-anchor="middle" class="head">Type matches?</text><text x="600" y="298" text-anchor="middle" class="txt">mini9P vs RPC vs Job</text><path d="M600 308L600 350" class="line" marker-end="url(#a)"/><rect x="390" y="350" width="420" height="78" rx="12" class="amber"/><text x="600" y="388" text-anchor="middle" class="head">Source + wire ID match?</text><text x="600" y="418" text-anchor="middle" class="txt">reject wrong node or old tag</text><path d="M600 428L600 470" class="line" marker-end="url(#a)"/><rect x="390" y="470" width="420" height="78" rx="12" class="amber"/><text x="600" y="508" text-anchor="middle" class="head">Boot and stream order valid?</text><text x="600" y="538" text-anchor="middle" class="txt">append chunk or complete</text><path d="M810 509L980 509" class="line" marker-end="url(#a)"/><rect x="980" y="465" width="170" height="88" rx="12" class="green"/><text x="1065" y="503" text-anchor="middle" class="head">Wake waiter</text><text x="1065" y="533" text-anchor="middle" class="txt">exactly once</text><path d="M390 269H205V510H390" class="dash" marker-end="url(#a)"/><rect x="55" y="465" width="150" height="88" rx="12" class="box"/><text x="130" y="503" text-anchor="middle" class="head">Drop</text><text x="130" y="533" text-anchor="middle" class="txt">stale / malformed</text><text x="600" y="625" text-anchor="middle" class="txt">Strict matching prevents a delayed response from completing an unrelated request.</text></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Streaming parser finite-state machine</text><rect x="55" y="245" width="210" height="95" rx="12" class="blue"/><text x="160" y="283" text-anchor="middle" class="head">SEARCH</text><text x="160" y="313" text-anchor="middle" class="txt">scan M H</text><path d="M265 292L365 292" class="line" marker-end="url(#a)"/><rect x="365" y="245" width="210" height="95" rx="12" class="amber"/><text x="470" y="283" text-anchor="middle" class="head">HEADER</text><text x="470" y="313" text-anchor="middle" class="txt">19 bytes</text><path d="M575 292L675 292" class="line" marker-end="url(#a)"/><rect x="675" y="245" width="210" height="95" rx="12" class="green"/><text x="780" y="283" text-anchor="middle" class="head">PAYLOAD</text><text x="780" y="313" text-anchor="middle" class="txt">payload_len bytes</text><path d="M885 292L985 292" class="line" marker-end="url(#a)"/><rect x="985" y="245" width="160" height="95" rx="12" class="blue"/><text x="1065" y="283" text-anchor="middle" class="head">EMIT</text><text x="1065" y="313" text-anchor="middle" class="txt">frame view</text><path d="M470 340 C470 500 160 500 160 340" class="dash" marker-end="url(#a)"/>
   <path d="M780 340 C780 555 160 555 160 340" class="dash" marker-end="url(#a)"/><text x="330" y="485" text-anchor="middle" class="txt">bad header CRC / invalid length</text><text x="560" y="545" text-anchor="middle" class="txt">bad payload CRC / noise</text><rect x="365" y="95" width="470" height="80" rx="12" class="box"/><text x="600" y="133" text-anchor="middle" class="head">Partial input is retained</text><text x="600" y="163" text-anchor="middle" class="txt">callbacks may split anywhere in header or payload</text><text x="600" y="625" text-anchor="middle" class="txt">The parser advances O(n) with a fixed buffer and bounded resynchronization.</text></svg>

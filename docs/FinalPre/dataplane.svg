</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Typed data planes</text><rect x="55" y="120" width="235" height="120" rx="12" class="blue"/><text x="172.5" y="158" text-anchor="middle" class="head">Host API</text><text x="172.5" y="188" text-anchor="middle" class="txt">path / RPC / job</text><path d="M290 180 L390 180" class="line" marker-end="url(#a)"/><rect x="390" y="90" width="300" height="80" rx="12" class="green"/><text x="540" y="128" text-anchor="middle" class="head">mini9P</text><text x="540" y="158" text-anchor="middle" class="txt">attach - walk - read/write</text><rect x="390" y="220" width="300" height="80" rx="12" class="amber"/><text x="540" y="258" text-anchor="middle" class="head">RPC</text><text x="540" y="288" text-anchor="middle" class="txt">unary - stream - cancel</text><rect x="390" y="350" width="300" height="80" rx="12" class="blue"/><text x="540" y="388" text-anchor="middle" class="head">Job</text><text x="540" y="418" text-anchor="middle" class="txt">submit - status - result</text><path d="M690 130 L790 180" class="line" marker-end="url(#a)"/><path d="M690 260 L790 260" class="line" marker-end="url(#a)"/><path d="M690 390 L790 340" class="line" marker-end="url(#a)"/><rect x="790" y="120" width="350" height="290" rx="12" class="box"/><text x="965" y="158" text-anchor="middle" class="head">STM32 service runtime</text><text x="965" y="188" text-anchor="middle" class="txt">typed dispatch and bounded responses</text><text x="965" y="250" text-anchor="middle" class="txt">local_vfs / rpc_service</text><text x="965" y="285" text-anchor="middle" class="txt">job_service / compute_worker</text><text x="600" y="625" text-anchor="middle" class="txt">Each response is matched by data type, source address and wire identifier.</text></svg>

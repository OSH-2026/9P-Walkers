<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Address allocation and lease renewal</text><text x="180" y="95" text-anchor="middle" class="head">Node</text><text x="600" y="95" text-anchor="middle" class="head">Coordinator</text><text x="1020" y="95" text-anchor="middle" class="head">Lease table</text><path d="M180 110L180 555" class="dash"/><path d="M600 110L600 555" class="dash"/><path d="M1020 110L1020 555" class="dash"/><path d="M180 155L600 155" class="line" marker-end="url(#a)"/><text x="390" y="145" text-anchor="middle" class="tiny">REGISTER uid + boot_id</text><path d="M600 225L1020 225" class="line" marker-end="url(#a)"/><text x="810" y="215" text-anchor="middle" class="tiny">scan addr 1..253</text><path d="M1020 290L600 290" class="line" marker-end="url(#a)"/><text x="810" y="280" text-anchor="middle" class="tiny">addr + epoch + 30 s lease</text><path d="M600 350L180 350" class="line" marker-end="url(#a)"/><text x="390" y="340" text-anchor="middle" class="tiny">ADDR_ASSIGN</text><path d="M180 430L600 430" class="line" marker-end="url(#a)"/><text x="390" y="420" text-anchor="middle" class="tiny">LEASE_RENEW at half life</text><path d="M600 495L180 495" class="line" marker-end="url(#a)"/><text x="390" y="485" text-anchor="middle" class="tiny">LEASE_ACK / reject stale boot</text><text x="600" y="625" text-anchor="middle" class="txt">A reboot changes boot_id, invalidating old sessions, jobs and leases.</text></svg>

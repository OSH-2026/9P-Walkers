<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Bounded resource profile (not benchmark data)</text><rect x="55" y="95" width="330" height="95" rx="12" class="blue"/><text x="220" y="133" text-anchor="middle" class="head">Link parser</text><text x="220" y="163" text-anchor="middle" class="txt">O(n), fixed 531-byte frame bound</text><rect x="435" y="95" width="330" height="95" rx="12" class="green"/><text x="600" y="133" text-anchor="middle" class="head">Address allocator</text><text x="600" y="163" text-anchor="middle" class="txt">at most 254 probes</text><rect x="815" y="95" width="330" height="95" rx="12" class="amber"/><text x="980" y="133" text-anchor="middle" class="head">Route lookup</text><text x="980" y="163" text-anchor="middle" class="txt">small fixed table, linear scan</text><line x1="110" y1="520" x2="110" y2="245" class="line"/><line x1="110" y1="520" x2="1120" y2="520" class="line"/>
   <text x="80" y="265" text-anchor="middle" class="txt">work</text><text x="1115" y="550" text-anchor="end" class="txt">input / configured capacity</text>
   <path d="M145 485 L1050 285" stroke="#187caf" stroke-width="7" fill="none"/>
   <path d="M145 430 L1050 430" stroke="#4d8d5a" stroke-width="7" fill="none"/>
   <text x="835" y="315" text-anchor="middle" class="head">stream parse: linear</text><text x="835" y="412" text-anchor="middle" class="head">fixed-capacity tables: bounded</text>
   <rect x="175" y="265" width="270" height="90" rx="12" class="box"/><text x="310" y="303" text-anchor="middle" class="head">No dynamic growth</text><text x="310" y="333" text-anchor="middle" class="txt">frame pool + static slots</text><text x="600" y="625" text-anchor="middle" class="txt">Actual latency depends on UART topology and kernel workload; no fabricated throughput values are shown.</text></svg>

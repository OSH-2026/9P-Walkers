<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Multi-host collaboration</text><rect x="70" y="105" width="360" height="125" rx="12" class="blue"/><text x="250" y="143" text-anchor="middle" class="head">ESP32-P4</text><text x="250" y="173" text-anchor="middle" class="txt">leader | Ethernet | local mcu1/mcu2</text><rect x="770" y="105" width="360" height="125" rx="12" class="blue"/><text x="950" y="143" text-anchor="middle" class="head">ESP32-S3</text><text x="950" y="173" text-anchor="middle" class="txt">peer | WiFi | local mcu3</text><path d="M430 145L770 145" class="line" marker-end="url(#a)"/><path d="M770 195L430 195" class="line" marker-end="url(#a)"/><text x="600" y="130" text-anchor="middle" class="tiny">advertise / election / time.exchange</text><text x="600" y="220" text-anchor="middle" class="tiny">topology.sync / read_node / write_node</text><rect x="95" y="365" width="260" height="100" rx="12" class="green"/><text x="225" y="403" text-anchor="middle" class="head">mcu1</text><text x="225" y="433" text-anchor="middle" class="txt">global owner=P4</text><rect x="415" y="365" width="260" height="100" rx="12" class="green"/><text x="545" y="403" text-anchor="middle" class="head">mcu2</text><text x="545" y="433" text-anchor="middle" class="txt">global owner=P4</text><rect x="845" y="365" width="260" height="100" rx="12" class="green"/><text x="975" y="403" text-anchor="middle" class="head">mcu3</text><text x="975" y="433" text-anchor="middle" class="txt">global owner=S3</text><path d="M250 230L225 365" class="line" marker-end="url(#a)"/><path d="M320 230L545 365" class="line" marker-end="url(#a)"/><path d="M950 230L975 365" class="line" marker-end="url(#a)"/><rect x="390" y="510" width="420" height="75" rx="12" class="amber"/><text x="600" y="548" text-anchor="middle" class="head">Consistent global namespace</text><text x="600" y="578" text-anchor="middle" class="txt">/mcu1  /mcu2  /mcu3</text><text x="600" y="625" text-anchor="middle" class="txt">The owner host executes the physical UART request; other hosts proxy it over bounded CBOR.</text></svg>

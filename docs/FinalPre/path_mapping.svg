<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Unified namespace mapping</text><rect x="45" y="230" width="250" height="110" rx="12" class="blue"/><text x="170" y="268" text-anchor="middle" class="head">Global path</text><text x="170" y="298" text-anchor="middle" class="txt">/mcu2/sys/health</text><path d="M295 285L395 285" class="line" marker-end="url(#a)"/><rect x="395" y="230" width="250" height="110" rx="12" class="amber"/><text x="520" y="268" text-anchor="middle" class="head">Route snapshot</text><text x="520" y="298" text-anchor="middle" class="txt">owner host + addr + boot</text><path d="M645 285L745 285" class="line" marker-end="url(#a)"/><rect x="745" y="230" width="200" height="110" rx="12" class="green"/><text x="845" y="268" text-anchor="middle" class="head">Local path</text><text x="845" y="298" text-anchor="middle" class="txt">/sys/health</text><path d="M945 285L1020 285" class="line" marker-end="url(#a)"/><rect x="1020" y="230" width="150" height="110" rx="12" class="box"/><text x="1095" y="268" text-anchor="middle" class="head">VFS node</text><text x="1095" y="298" text-anchor="middle" class="txt">qid + text</text><rect x="210" y="420" width="780" height="85" rx="12" class="box"/><text x="600" y="458" text-anchor="middle" class="head">Generation guard</text><text x="600" y="488" text-anchor="middle" class="txt">invalidate open handles when UID or boot_id changes</text><text x="600" y="625" text-anchor="middle" class="txt">The same global path works for local and remote owner hosts.</text></svg>

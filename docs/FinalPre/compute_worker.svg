<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Incremental compute worker</text><rect x="50" y="120" width="230" height="105" rx="12" class="blue"/><text x="165" y="158" text-anchor="middle" class="head">Job submit</text><text x="165" y="188" text-anchor="middle" class="txt">fixed input buffer</text><path d="M280 172L390 172" class="line" marker-end="url(#a)"/><rect x="390" y="105" width="270" height="135" rx="12" class="amber"/><text x="525" y="143" text-anchor="middle" class="head">Static job slots</text><text x="525" y="173" text-anchor="middle" class="txt">QUEUED | RUNNING | DONE</text><path d="M660 172L770 172" class="line" marker-end="url(#a)"/><rect x="770" y="120" width="380" height="105" rx="12" class="green"/><text x="960" y="158" text-anchor="middle" class="head">Low-priority compute task</text><text x="960" y="188" text-anchor="middle" class="txt">one bounded work unit per step</text><path d="M960 225L960 310" class="line" marker-end="url(#a)"/><rect x="770" y="310" width="380" height="95" rx="12" class="box"/><text x="960" y="348" text-anchor="middle" class="head">Progress snapshot</text><text x="960" y="378" text-anchor="middle" class="txt">permille + status + result length</text><path d="M770 357 C610 357 610 500 960 500 C1080 500 1080 405 1080 405" class="dash" marker-end="url(#a)"/><rect x="65" y="355" width="560" height="130" rx="12" class="blue"/><text x="345" y="393" text-anchor="middle" class="head">Communication tasks continue</text><text x="345" y="423" text-anchor="middle" class="txt">HELLO | lease | routes | health | RPC</text><text x="600" y="625" text-anchor="middle" class="txt">Each step yields the CPU; long kernels do not execute inside service_task.</text></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs>
<style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.dark{fill:#173650;stroke:#173650;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}
</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker>
</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">System startup sequence</text><text x="270" y="95" text-anchor="middle" class="head">ESP32 host</text><text x="930" y="95" text-anchor="middle" class="head">STM32 node</text><path d="M270 110 L270 570" class="dash"/><path d="M930 110 L930 570" class="dash"/><rect x="95" y="130" width="350" height="65" rx="12" class="blue"/><text x="270" y="168" text-anchor="middle" class="head">1. app_main</text><text x="270" y="198" text-anchor="middle" class="txt">chip and persistent epoch</text><rect x="755" y="130" width="350" height="65" rx="12" class="green"/><text x="930" y="168" text-anchor="middle" class="head">1. HAL + peripherals</text><text x="930" y="198" text-anchor="middle" class="txt">UART DMA, timers, display</text><rect x="95" y="225" width="350" height="65" rx="12" class="blue"/><text x="270" y="263" text-anchor="middle" class="head">2. Coordinator runtime</text><text x="270" y="293" text-anchor="middle" class="txt">parser, sessions, routes</text><rect x="755" y="225" width="350" height="65" rx="12" class="green"/><text x="930" y="263" text-anchor="middle" class="head">2. FreeRTOS objects</text><text x="930" y="293" text-anchor="middle" class="txt">queues, pools, static tasks</text><rect x="95" y="320" width="350" height="65" rx="12" class="blue"/><text x="270" y="358" text-anchor="middle" class="head">3. Network services</text><text x="270" y="388" text-anchor="middle" class="txt">LAN, mDNS, Host RPC, SNTP</text><rect x="755" y="320" width="350" height="65" rx="12" class="green"/><text x="930" y="358" text-anchor="middle" class="head">3. Scheduler starts</text><text x="930" y="388" text-anchor="middle" class="txt">link, mesh, service, compute</text><rect x="95" y="415" width="350" height="65" rx="12" class="blue"/><text x="270" y="453" text-anchor="middle" class="head">4. User services</text><text x="270" y="483" text-anchor="middle" class="txt">WebShell, Lua, inference</text><rect x="755" y="415" width="350" height="65" rx="12" class="green"/><text x="930" y="453" text-anchor="middle" class="head">4. Link probing</text><text x="930" y="483" text-anchor="middle" class="txt">HELLO / ACK on every UART</text><path d="M445 510 L755 510" class="line" marker-end="url(#a)"/><text x="600" y="498" text-anchor="middle" class="txt">bootstrap traffic begins</text><text x="600" y="625" text-anchor="middle" class="txt">Both sides become observable before application jobs are accepted.</text></svg>

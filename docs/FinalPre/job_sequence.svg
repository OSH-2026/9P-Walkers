</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Asynchronous Job lifecycle</text><text x="135" y="95" text-anchor="middle" class="head">User</text><text x="390" y="95" text-anchor="middle" class="head">Job manager</text><text x="665" y="95" text-anchor="middle" class="head">Job service</text><text x="1030" y="95" text-anchor="middle" class="head">Compute task</text><path d="M135 110 L135 560" class="dash"/><path d="M390 110 L390 560" class="dash"/><path d="M665 110 L665 560" class="dash"/><path d="M1030 110 L1030 560" class="dash"/><path d="M135 155 L390 155" class="line" marker-end="url(#a)"/><text x="260" y="145" text-anchor="middle" class="tiny">submit kernel + input</text><path d="M390 225 L665 225" class="line" marker-end="url(#a)"/><text x="525" y="215" text-anchor="middle" class="tiny">JOB_SUBMIT</text><path d="M665 295 L1030 295" class="line" marker-end="url(#a)"/><text x="848" y="285" text-anchor="middle" class="tiny">enqueue fixed slot</text><path d="M1030 365 L1030 445" class="line" marker-end="url(#a)"/><text x="1010" y="405" text-anchor="end" class="tiny">step() + yield</text><path d="M1030 470 L665 470" class="line" marker-end="url(#a)"/><text x="848" y="460" text-anchor="middle" class="tiny">DONE + result</text><path d="M665 525 L390 525" class="line" marker-end="url(#a)"/><text x="525" y="515" text-anchor="middle" class="tiny">status / result response</text><text x="600" y="625" text-anchor="middle" class="txt">Communication remains responsive while the low-priority worker advances bounded work units.</text></svg>

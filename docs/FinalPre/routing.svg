<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Bidirectional route installation</text><rect x="70" y="250" width="230" height="105" rx="12" class="blue"/><text x="185" y="288" text-anchor="middle" class="head">Host</text><text x="185" y="318" text-anchor="middle" class="txt">route authority</text><rect x="470" y="120" width="230" height="105" rx="12" class="green"/><text x="585" y="158" text-anchor="middle" class="head">Node A</text><text x="585" y="188" text-anchor="middle" class="txt">addr=1, port=0</text><rect x="470" y="400" width="230" height="105" rx="12" class="green"/><text x="585" y="438" text-anchor="middle" class="head">Node B</text><text x="585" y="468" text-anchor="middle" class="txt">addr=2, port=1</text><path d="M300 280L470 175" class="line" marker-end="url(#a)"/><path d="M300 325L470 452" class="line" marker-end="url(#a)"/><path d="M585 225L585 400" class="line"/><rect x="810" y="135" width="320" height="100" rx="12" class="amber"/><text x="970" y="173" text-anchor="middle" class="head">Forward update</text><text x="970" y="203" text-anchor="middle" class="txt">owner=1 dst=2 next=2</text><rect x="810" y="390" width="320" height="100" rx="12" class="amber"/><text x="970" y="428" text-anchor="middle" class="head">Reverse update</text><text x="970" y="458" text-anchor="middle" class="txt">owner=2 dst=1 next=1</text><path d="M700 175L810 185" class="line" marker-end="url(#a)"/><path d="M700 452L810 440" class="line" marker-end="url(#a)"/><text x="600" y="625" text-anchor="middle" class="txt">A LINK_STATE report creates both directions so peer-to-peer traffic does not depend on flooding.</text></svg>

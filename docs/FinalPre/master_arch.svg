<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker>
</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">ESP32 host architecture</text><rect x="70" y="90" width="1060" height="85" rx="12" class="blue"/><text x="600" y="128" text-anchor="middle" class="head">User interfaces</text><text x="600" y="158" text-anchor="middle" class="txt">WebShell | Lua scheduler | HTTP/WebSocket | LLM</text><path d="M600 175 L600 215" class="line" marker-end="url(#a)"/><rect x="70" y="215" width="1060" height="100" rx="12" class="box"/><text x="600" y="253" text-anchor="middle" class="head">Host services</text><text x="600" y="283" text-anchor="middle" class="txt">cluster_vfs | RPC client | Job manager | observability</text><path d="M600 315 L600 355" class="line" marker-end="url(#a)"/><rect x="70" y="355" width="510" height="105" rx="12" class="green"/><text x="325" y="393" text-anchor="middle" class="head">Mesh coordination</text><text x="325" y="423" text-anchor="middle" class="txt">coordinator | sessions | routes | leases</text><rect x="620" y="355" width="510" height="105" rx="12" class="amber"/><text x="875" y="393" text-anchor="middle" class="head">Host collaboration</text><text x="875" y="423" text-anchor="middle" class="txt">mDNS | election | topology | time.exchange</text><path d="M325 460 L325 505" class="line" marker-end="url(#a)"/><path d="M875 460 L875 505" class="line" marker-end="url(#a)"/><rect x="70" y="505" width="510" height="90" rx="12" class="dark"/><text x="325" y="543" text-anchor="middle" class="head">UART plane</text><text x="325" y="573" text-anchor="middle" class="txt">Link Frame v2 + Mesh2</text><rect x="620" y="505" width="510" height="90" rx="12" class="dark"/><text x="875" y="543" text-anchor="middle" class="head">IP plane</text><text x="875" y="573" text-anchor="middle" class="txt">TCP/9909 + bounded CBOR</text><text x="600" y="625" text-anchor="middle" class="txt">One process joins two network planes without tunneling raw UART frames.</text></s
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs>
<style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.dark{fill:#dce8f1;stroke:#173650;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}

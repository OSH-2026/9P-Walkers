<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Link Frame v2 and streaming parser</text><text x="80" y="112" text-anchor="start" class="head">Wire frame</text><rect x="80" y="135" width="1040" height="105" rx="8" class="box"/>
   <rect x="80" y="135" width="105" height="105" fill="#d7ebf7"/><rect x="185" y="135" width="105" height="105" fill="#edf7ed"/>
   <rect x="290" y="135" width="160" height="105" fill="#fff4df"/><rect x="450" y="135" width="190" height="105" fill="#e5f2fa"/>
   <rect x="640" y="135" width="180" height="105" fill="#edf7ed"/><rect x="820" y="135" width="300" height="105" fill="#f4f6f8"/>
   <text x="132" y="180" text-anchor="middle" class="head">Magic</text><text x="132" y="211" text-anchor="middle" class="txt">2 B</text><text x="237" y="180" text-anchor="middle" class="head">Ver/HLen</text><text x="237" y="211" text-anchor="middle" class="txt">2 B</text>
   <text x="370" y="180" text-anchor="middle" class="head">Type + flags</text><text x="370" y="211" text-anchor="middle" class="txt">2 B</text><text x="545" y="180" text-anchor="middle" class="head">src dst ttl seq</text><text x="545" y="211" text-anchor="middle" class="txt">5 B</text>
   <text x="730" y="180" text-anchor="middle" class="head">len + CRCs</text><text x="730" y="211" text-anchor="middle" class="txt">6 B</text><text x="970" y="180" text-anchor="middle" class="head">Payload</text><text x="970" y="211" text-anchor="middle" class="txt">0..512 B</text>
   <path d="M155 310L340 310" class="line" marker-end="url(#a)"/><rect x="340" y="265" width="200" height="90" rx="12" class="blue"/><text x="440" y="303" text-anchor="middle" class="head">SEARCH</text><text x="440" y="333" text-anchor="middle" class="txt">find M H</text><path d="M540 310L625 310" class="line" marker-end="url(#a)"/>
   <rect x="625" y="265" width="200" height="90" rx="12" class="amber"/><text x="725" y="303" text-anchor="middle" class="head">HEADER</text><text x="725" y="333" text-anchor="middle" class="txt">length + CRC</text><path d="M825 310L910 310" class="line" marker-end="url(#a)"/><rect x="910" y="265" width="200" height="90" rx="12" class="green"/><text x="1010" y="303" text-anchor="middle" class="head">PAYLOAD</text><text x="1010" y="333" text-anchor="middle" class="txt">CRC + emit</text>
   <path d="M1010 355 C1010 500 440 500 440 355" class="dash" marker-end="url(#a)"/><text x="725" y="490" text-anchor="middle" class="txt">noise / bad CRC: retain possible magic suffix</text><text x="600" y="625" text-anchor="middle" class="txt">Header CRC protects framing metadata; payload CRC protects the complete typed message.</text></svg>

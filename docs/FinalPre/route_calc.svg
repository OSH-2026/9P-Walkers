<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Route calculation from link state</text><rect x="55" y="105" width="330" height="115" rx="12" class="blue"/><text x="220" y="143" text-anchor="middle" class="head">Input LINK_STATE</text><text x="220" y="173" text-anchor="middle" class="txt">local=1 peer=2 ingress=0 metric=1</text><path d="M385 162L480 162" class="line" marker-end="url(#a)"/><rect x="480" y="105" width="240" height="115" rx="12" class="amber"/><text x="600" y="143" text-anchor="middle" class="head">Validate</text><text x="600" y="173" text-anchor="middle" class="txt">identity + freshness</text><path d="M720 162L815 162" class="line" marker-end="url(#a)"/><rect x="815" y="105" width="330" height="115" rx="12" class="green"/><text x="980" y="143" text-anchor="middle" class="head">Versioned updates</text><text x="980" y="173" text-anchor="middle" class="txt">monotonic route_version</text><rect x="120" y="350" width="400" height="120" rx="12" class="box"/><text x="320" y="388" text-anchor="middle" class="head">Forward route</text><text x="320" y="418" text-anchor="middle" class="txt">owner=1 dst=2 next_hop=2 port=link</text><rect x="680" y="350" width="400" height="120" rx="12" class="box"/><text x="880" y="388" text-anchor="middle" class="head">Reverse route</text><text x="880" y="418" text-anchor="middle" class="txt">owner=2 dst=1 next_hop=1 port=link</text><path d="M930 220L880 350" class="line" marker-end="url(#a)"/><path d="M1030 220L320 350" class="line" marker-end="url(#a)"/><rect x="365" y="510" width="470" height="72" rx="12" class="amber"/><text x="600" y="548" text-anchor="middle" class="head">Node apply rule</text><text x="600" y="578" text-anchor="middle" class="txt">ignore older route_version; delete explicitly</text><text x="600" y="625" text-anchor="middle" class="txt">Current metric is hop-based; the data model can carry weighted costs later.</text></svg>

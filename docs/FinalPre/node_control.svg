<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">STM32 port manager and forwarding</text><rect x="55" y="105" width="320" height="100" rx="12" class="blue"/><text x="215" y="143" text-anchor="middle" class="head">UART port 0</text><text x="215" y="173" text-anchor="middle" class="txt">PEER / UPSTREAM</text><rect x="825" y="105" width="320" height="100" rx="12" class="blue"/><text x="985" y="143" text-anchor="middle" class="head">UART port 1</text><text x="985" y="173" text-anchor="middle" class="txt">PEER / DOWNSTREAM</text><path d="M215 205L440 280" class="line" marker-end="url(#a)"/><path d="M985 205L760 280" class="line" marker-end="url(#a)"/><rect x="440" y="235" width="320" height="115" rx="12" class="green"/><text x="600" y="273" text-anchor="middle" class="head">node_control</text><text x="600" y="303" text-anchor="middle" class="txt">authority + address + route table</text><path d="M600 350L600 420" class="line" marker-end="url(#a)"/><rect x="390" y="420" width="420" height="100" rx="12" class="amber"/><text x="600" y="458" text-anchor="middle" class="head">Forward decision</text><text x="600" y="488" text-anchor="middle" class="txt">local? service : route lookup + TTL-1</text><path d="M390 470L215 470" class="line" marker-end="url(#a)"/><path d="M810 470L985 470" class="line" marker-end="url(#a)"/><rect x="55" y="430" width="320" height="90" rx="12" class="box"/><text x="215" y="468" text-anchor="middle" class="head">Control TX queue</text><text x="215" y="498" text-anchor="middle" class="txt">priority traffic</text><rect x="825" y="430" width="320" height="90" rx="12" class="box"/><text x="985" y="468" text-anchor="middle" class="head">Data TX queue</text><text x="985" y="498" text-anchor="middle" class="txt">mini9P / RPC / Job</text><text x="600" y="625" text-anchor="middle" class="txt">An error or quarantine on one UART never stops the other port.</text></svg>

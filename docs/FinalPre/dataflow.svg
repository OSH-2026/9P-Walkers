<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.code{font-family:monospace;font-size:21px;fill:#dceaf4}.kw{fill:#78c7ff}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">End-to-end data flow</text><rect x="35" y="110" width="180" height="90" rx="12" class="blue"/><text x="125" y="148" text-anchor="middle" class="head">WebShell / Lua</text><text x="125" y="178" text-anchor="middle" class="txt">user request</text><path d="M215 155L290 155" class="line" marker-end="url(#a)"/><rect x="290" y="110" width="180" height="90" rx="12" class="box"/><text x="380" y="148" text-anchor="middle" class="head">Host API</text><text x="380" y="178" text-anchor="middle" class="txt">VFS / RPC / Job</text><path d="M470 155L545 155" class="line" marker-end="url(#a)"/><rect x="545" y="110" width="180" height="90" rx="12" class="amber"/><text x="635" y="148" text-anchor="middle" class="head">Session</text><text x="635" y="178" text-anchor="middle" class="txt">typed pending</text><path d="M725 155L800 155" class="line" marker-end="url(#a)"/><rect x="800" y="110" width="180" height="90" rx="12" class="blue"/><text x="890" y="148" text-anchor="middle" class="head">UART Link</text><text x="890" y="178" text-anchor="middle" class="txt">frame + CRC</text><path d="M980 155L1055 155" class="line" marker-end="url(#a)"/><rect x="1055" y="110" width="120" height="90" rx="12" class="green"/><text x="1115" y="148" text-anchor="middle" class="head">Node</text><text x="1115" y="178" text-anchor="middle" class="txt">route</text><path d="M1115 200L1115 315" class="line" marker-end="url(#a)"/><rect x="940" y="315" width="235" height="90" rx="12" class="green"/><text x="1057.5" y="353" text-anchor="middle" class="head">Service runtime</text><text x="1057.5" y="383" text-anchor="middle" class="txt">typed dispatch</text><path d="M940 360L840 360" class="line" marker-end="url(#a)"/><rect x="610" y="315" width="230" height="90" rx="12" class="box"/><text x="725" y="353" text-anchor="middle" class="head">mini9P / RPC</text><text x="725" y="383" text-anchor="middle" class="txt">short operation</text><path d="M610 360L510 360" class="line" marker-end="url(#a)"/><rect x="280" y="315" width="230" height="90" rx="12" class="amber"/><text x="395" y="353" text-anchor="middle" class="head">Job service</text><text x="395" y="383" text-anchor="middle" class="txt">fixed job slot</text><path d="M280 360L180 360" class="line" marker-end="url(#a)"/><rect x="35" y="315" width="145" height="90" rx="12" class="green"/><text x="107.5" y="353" text-anchor="middle" class="head">Compute</text><text x="107.5" y="383" text-anchor="middle" class="txt">step + yield</text><path d="M1080 405 C1080 535 175 535 175 405" class="dash" marker-end="url(#a)"/><text x="625" y="525" text-anchor="middle" class="txt">responses return through the same typed session path</text><text x="600" y="625" text-anchor="middle" class="txt">Control traffic uses the priority queue and remains independent from long computations.</text></svg>

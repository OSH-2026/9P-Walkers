<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs><style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker></defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Mesh2 control-plane exchange</text><text x="150" y="95" text-anchor="middle" class="head">Host authority</text><text x="600" y="95" text-anchor="middle" class="head">Relay node</text><text x="1050" y="95" text-anchor="middle" class="head">Joining node</text><path d="M150 110L150 560" class="dash"/><path d="M600 110L600 560" class="dash"/><path d="M1050 110L1050 560" class="dash"/><path d="M1050 145L600 145" class="line" marker-end="url(#a)"/><text x="825" y="135" text-anchor="middle" class="tiny">HELLO / ACK</text><path d="M1050 215L600 215" class="line" marker-end="url(#a)"/><path d="M600 215L150 215" class="line" marker-end="url(#a)"/><text x="600" y="205" text-anchor="middle" class="tiny">NODE_REGISTER (UID + boot_id)</text><path d="M150 285L600 285" class="line" marker-end="url(#a)"/><path d="M600 285L1050 285" class="line" marker-end="url(#a)"/><text x="600" y="275" text-anchor="middle" class="tiny">ADDR_ASSIGN (address + lease)</text><path d="M1050 355L600 355" class="line" marker-end="url(#a)"/><path d="M600 355L150 355" class="line" marker-end="url(#a)"/><text x="600" y="345" text-anchor="middle" class="tiny">LEASE_RENEW + LINK_STATE</text><path d="M150 425L600 425" class="line" marker-end="url(#a)"/><path d="M600 425L1050 425" class="line" marker-end="url(#a)"/><text x="600" y="415" text-anchor="middle" class="tiny">LEASE_ACK + ROUTE_UPDATE</text><path d="M150 495L600 495" class="line" marker-end="url(#a)"/><path d="M600 495L1050 495" class="line" marker-end="url(#a)"/><text x="600" y="485" text-anchor="middle" class="tiny">HOST_ADVERTISE + TIME_SYNC</text><text x="600" y="625" text-anchor="middle" class="txt">Only the elected authority may assign addresses, leases and route versions.</text></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs>
<style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.dark{fill:#dce8f1;stroke:#173650;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}
</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker>
</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">STM32 node architecture</text><rect x="85" y="88" width="1030" height="82" rx="12" class="blue"/><text x="600" y="126" text-anchor="middle" class="head">Local services</text><text x="600" y="156" text-anchor="middle" class="txt">mini9P | RPC | Job | /sys/time | /compute</text><path d="M600 170 L600 205" class="line" marker-end="url(#a)"/><rect x="85" y="205" width="1030" height="88" rx="12" class="box"/><text x="600" y="243" text-anchor="middle" class="head">Service runtime + compute worker</text><text x="600" y="273" text-anchor="middle" class="txt">protocol dispatch on service task; bounded work on low-priority compute task</text><path d="M600 293 L600 328" class="line" marker-end="url(#a)"/><rect x="85" y="328" width="500" height="92" rx="12" class="green"/><text x="335" y="366" text-anchor="middle" class="head">Node control</text><text x="335" y="396" text-anchor="middle" class="txt">address | lease | routes | relay | wall offset</text><rect x="615" y="328" width="500" height="92" rx="12" class="amber"/><text x="865" y="366" text-anchor="middle" class="head">Port manager</text><text x="865" y="396" text-anchor="middle" class="txt">HELLO FSM | peer identity | health</text><path d="M335 420 L335 470" class="line" marker-end="url(#a)"/><path d="M865 420 L865 470" class="line" marker-end="url(#a)"/><rect x="85" y="470" width="1030" height="100" rx="12" class="dark"/><text x="600" y="508" text-anchor="middle" class="head">UART DMA transport</text><text x="600" y="538" text-anchor="middle" class="txt">IDLE RX | frame pool | parser | priority TX queues</text><text x="600" y="625" text-anchor="middle" class="txt">Fixed tasks, fixed frame blocks and no dynamic allocation in the communication path.</text></svg>

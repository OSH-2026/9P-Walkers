<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650"><defs>
<style>
.bg{fill:#f7fafc}.title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#123b61}.head{font-family:sans-serif;font-size:26px;font-weight:700;fill:#173650}.txt{font-family:sans-serif;font-size:20px;fill:#50687e}.tiny{font-family:monospace;font-size:18px;fill:#486176}.box{fill:#fff;stroke:#7897b1;stroke-width:3}.blue{fill:#e5f2fa;stroke:#187caf;stroke-width:3}.green{fill:#edf7ed;stroke:#4d8d5a;stroke-width:3}.amber{fill:#fff4df;stroke:#c88725;stroke-width:3}.dark{fill:#173650;stroke:#173650;stroke-width:3}.line{stroke:#426b8c;stroke-width:4;fill:none}.dash{stroke:#6f879a;stroke-width:3;stroke-dasharray:10 8;fill:none}
</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#426b8c"/></marker>
</defs><rect width="1200" height="650" rx="20" class="bg"/><text x="600" y="48" text-anchor="middle" class="title">Node join state machine</text><rect x="35" y="245" width="180" height="90" rx="12" class="box"/><text x="125" y="283" text-anchor="middle" class="head">OFFLINE</text><text x="125" y="313" text-anchor="middle" class="txt">no address</text><path d="M215 290 L300 290" class="line" marker-end="url(#a)"/><rect x="300" y="245" width="180" height="90" rx="12" class="blue"/><text x="390" y="283" text-anchor="middle" class="head">PROBING</text><text x="390" y="313" text-anchor="middle" class="txt">HELLO / ACK</text><path d="M480 290 L565 290" class="line" marker-end="url(#a)"/><rect x="565" y="245" width="180" height="90" rx="12" class="amber"/><text x="655" y="283" text-anchor="middle" class="head">REGISTERING</text><text x="655" y="313" text-anchor="middle" class="txt">UID + boot_id</text><path d="M745 290 L830 290" class="line" marker-end="url(#a)"/><rect x="830" y="245" width="180" height="90" rx="12" class="green"/><text x="920" y="283" text-anchor="middle" class="head">ASSIGNED</text><text x="920" y="313" text-anchor="middle" class="txt">address + lease</text><path d="M1010 290 L1160 290" class="line" marker-end="url(#a)"/><text x="1080" y="260" text-anchor="middle" class="head">RENEW</text><text x="1080" y="292" text-anchor="middle" class="txt">LINK_STATE</text><text x="1080" y="318" text-anchor="middle" class="txt">ROUTES</text><path d="M920 335 C920 500 120 500 120 335" class="dash" marker-end="url(#a)"/><text x="520" y="490" text-anchor="middle" class="txt">lease expiry / authority change / peer loss</text><text x="600" y="625" text-anchor="middle" class="txt">ASSIGN binds identity to UID + boot_id; stale control state cannot survive a reboot.</text></svg>
